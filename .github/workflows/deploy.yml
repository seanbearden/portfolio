name: Deploy

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (tag, branch, or SHA)"
        required: false
        default: "main"

jobs:
  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    permissions:
      contents: read
      id-token: write
    env:
      REGION: us-central1
      GAR_REPO: us-central1-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/portfolio
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.ref || github.ref }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3
        with:
          workload_identity_provider: "projects/${{ vars.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/${{ vars.WIF_POOL }}/providers/${{ vars.WIF_PROVIDER }}"
          service_account: "${{ vars.GCP_SERVICE_ACCOUNT }}"

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@aa5489c8933f4cc7a4f7d45035b3b1440c9c10db # v3

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Determine version tag
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=sha-${GITHUB_SHA::8}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and push images
        run: |
          # Frontend
          docker build \
            --build-arg VITE_ASSETS_BASE_URL=${{ vars.ASSETS_BUCKET_URL }} \
            -t ${{ env.GAR_REPO }}/frontend:${{ steps.version.outputs.tag }} \
            -t ${{ env.GAR_REPO }}/frontend:latest \
            .
          docker push ${{ env.GAR_REPO }}/frontend:${{ steps.version.outputs.tag }}
          docker push ${{ env.GAR_REPO }}/frontend:latest

          # Backend
          docker build \
            -t ${{ env.GAR_REPO }}/backend:${{ steps.version.outputs.tag }} \
            -t ${{ env.GAR_REPO }}/backend:latest \
            backend/
          docker push ${{ env.GAR_REPO }}/backend:${{ steps.version.outputs.tag }}
          docker push ${{ env.GAR_REPO }}/backend:latest

      - name: Deploy Backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3
        with:
          service: portfolio-backend
          region: us-central1
          image: ${{ env.GAR_REPO }}/backend:${{ steps.version.outputs.tag }}
          env_vars: |
            OTEL_EXPORTER_OTLP_ENDPOINT=${{ secrets.OTEL_EXPORTER_OTLP_ENDPOINT }}
            OTEL_EXPORTER_OTLP_HEADERS=${{ secrets.OTEL_EXPORTER_OTLP_HEADERS }}

      - name: Deploy Frontend to Cloud Run
        id: deploy
        uses: google-github-actions/deploy-cloudrun@2028e2d7d30a78c6910e0632e48dd561b064884d # v3
        with:
          service: portfolio-frontend
          region: us-central1
          image: ${{ env.GAR_REPO }}/frontend:${{ steps.version.outputs.tag }}
          env_vars: |
            CHATBOT_API_URL=${{ steps.deploy-backend.outputs.url }}

      - name: Deployment summary
        run: |
          echo "## Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "- **URL**: ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version**: \`${{ steps.version.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"

  # Run ZAP baseline against the just-deployed production URL. Inlined here
  # rather than as a separate workflow with `workflow_run: ["Deploy"]` because
  # GitHub blocks workflow_run listeners from firing when the upstream
  # workflow was triggered by GITHUB_TOKEN (anti-recursion guard). When
  # release.yml dispatches Deploy via `gh workflow run` using GITHUB_TOKEN
  # (per PR #101), the listener never fires. Inlining sidesteps that.
  # The standalone .github/workflows/zap-baseline.yml still handles the
  # weekly cron and ad-hoc workflow_dispatch.
  zap-scan:
    name: ZAP baseline scan (post-deploy)
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: "https://seanbearden.com"
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: true
          artifact_name: "zap-baseline-report-${{ github.run_id }}"

      # Inline labeling sidesteps the same anti-recursion guard that blocks
      # workflow_run listeners: events generated by GITHUB_TOKEN don't fire
      # downstream workflows, so an `issues.opened` listener never sees the
      # ZAP-created issue. The action embeds "RunnerID:<run_id>" in every
      # issue body, so we look up our own run's issue and label it directly.
      # No-op when the scan is clean (no issue created).
      - name: Label auto-created ZAP issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          NUM=$(gh search issues "RunnerID:${RUN_ID}" \
                  --repo "${REPO}" --state open --limit 1 \
                  --json number --jq '.[0].number // empty')
          if [[ -z "${NUM}" ]]; then
            echo "No ZAP issue created for run ${RUN_ID}; nothing to label."
            exit 0
          fi
          echo "Labeling issue #${NUM}"
          gh issue edit "${NUM}" --repo "${REPO}" \
            --add-label "jules" --add-label "security"
