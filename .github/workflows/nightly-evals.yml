name: Nightly Evals

on:
  schedule:
    - cron: '0 8 * * *' # 08:00 UTC
  workflow_dispatch:

jobs:
  run-evals:
    runs-on: ubuntu-latest
    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@42375524e23c412d93fb67b49958b491fce71c38 # v5.4.0
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r evals/requirements.txt

      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@62cf5bd572d09891c4973f996aee595912e5b624' # v2.1.5
        with:
          workload_identity_provider: 'projects/731110543666/locations/global/workloadIdentityPools/github-pool/providers/github-oidc'
          service_account: 'portfolio-deploy@sean-bearden-portfolio.iam.gserviceaccount.com'

      - name: 'Set up Cloud SDK'
        uses: 'google-github-actions/setup-gcloud@cf3183592c3a5f973072228f4119d5e32ba36691' # v2.1.4

      - name: Fetch existing history
        run: |
          gsutil cp gs://seanbearden-assets/scores/history.json history.json || echo "[]" > history.json

      - name: Run evaluation suite
        env:
          LANGFUSE_PUBLIC_KEY: ${{ secrets.LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY: ${{ secrets.LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST: "https://cloud.langfuse.com"
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CHATBOT_API_URL: "https://bearden-resume-chatbot.com/api/chat"
        run: python evals/run_evals.py

      - name: Update history and Upload
        run: |
          # Merge new results into history, keep last 30 days
          python3 -c "
          import json
          try:
              with open('history.json', 'r') as f: history = json.load(f)
          except: history = []
          with open('eval_results.json', 'r') as f: latest = json.load(f)
          history.append(latest)
          # Deduplicate by date and keep last 30
          history = sorted({h['date']: h for h in history}.values(), key=lambda x: x['date'])[-30:]
          with open('history.json', 'w') as f: json.dump(history, f, indent=2)
          "
          gsutil cp eval_results.json gs://seanbearden-assets/scores/latest.json
          gsutil cp history.json gs://seanbearden-assets/scores/history.json
