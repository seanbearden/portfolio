name: ZAP Baseline

on:
  # Weekly cadence catches drift (new ZAP rules, upstream changes) even when
  # we haven't deployed. Post-deploy scans happen inline in deploy.yml itself
  # (workflow_run listeners are blocked when Deploy is triggered by
  # GITHUB_TOKEN — see deploy.yml's zap-scan job for context).
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "URL to scan (default = production seanbearden.com; pass a Cloud Run revision URL on dispatch to scan that instead)"
        required: false
        default: "https://seanbearden.com"

permissions:
  contents: read
  issues: write

jobs:
  baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ github.event.inputs.target || 'https://seanbearden.com' }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: true
          artifact_name: "zap-baseline-report"
