name: ZAP Baseline

on:
  # Weekly cadence catches drift (new ZAP rules, upstream changes) even when
  # we haven't deployed. Post-deploy scans happen inline in deploy.yml itself
  # (workflow_run listeners are blocked when Deploy is triggered by
  # GITHUB_TOKEN — see deploy.yml's zap-scan job for context).
  schedule:
    - cron: "0 6 * * 1"  # Mondays 06:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "URL to scan (default = production seanbearden.com; pass a Cloud Run revision URL on dispatch to scan that instead)"
        required: false
        default: "https://seanbearden.com"

permissions:
  contents: read
  issues: write

jobs:
  baseline:
    name: ZAP baseline scan
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Run ZAP baseline scan
        uses: zaproxy/action-baseline@de8ad967d3548d44ef623df22cf95c3b0baf8b25 # v0.15.0
        with:
          target: ${{ github.event.inputs.target || 'https://seanbearden.com' }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          rules_file_name: ".zap/rules.tsv"
          cmd_options: "-a"
          fail_action: false
          allow_issue_writing: true
          artifact_name: "zap-baseline-report"

      # Inline labeling: bot-created issues don't trigger `issues.opened`
      # listeners (GITHUB_TOKEN anti-recursion guard), so we label here using
      # the "RunnerID:<run_id>" anchor the action embeds in every issue body.
      # No-op when the scan is clean.
      #
      # Auth: uses JULES_LABEL_PAT (a user PAT with Issues: write) instead of
      # GITHUB_TOKEN. Labels applied via GITHUB_TOKEN attribute to
      # github-actions[bot], which Jules treats as unauthorized — Jules only
      # picks up issues whose `jules` label was applied by the repo owner.
      # The PAT routes the label-application through the user identity.
      - name: Label auto-created ZAP issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.JULES_LABEL_PAT }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          NUM=$(gh search issues "RunnerID:${RUN_ID}" \
                  --repo "${REPO}" --state open --limit 1 \
                  --json number --jq '.[0].number // empty')
          if [[ -z "${NUM}" ]]; then
            echo "No ZAP issue created for run ${RUN_ID}; nothing to label."
            exit 0
          fi
          echo "Labeling issue #${NUM}"
          gh issue edit "${NUM}" --repo "${REPO}" \
            --add-label "jules" --add-label "security"
