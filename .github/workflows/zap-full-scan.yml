name: ZAP Full Scan

# Active-attack scan. Sends real attack payloads (SQLi, XSS, command injection,
# directory traversal, etc.) to discover vulnerabilities the passive baseline
# can't catch. Runs ~30–60 min vs ~2–3 min for the baseline.
#
# Manual + monthly only — too slow to gate every deploy on, and the noise level
# from a static SPA doesn't justify weekly. Shares .zap/rules.tsv with the
# baseline so triage carries across both.

on:
  schedule:
    - cron: "0 7 1 * *"  # 1st of each month, 07:00 UTC
  workflow_dispatch:
    inputs:
      target:
        description: "URL to scan (default = production seanbearden.com; pass a Cloud Run revision URL on dispatch to scan that instead)"
        required: false
        default: "https://seanbearden.com"

permissions:
  contents: read
  issues: write

jobs:
  full-scan:
    name: ZAP full active scan
    runs-on: ubuntu-latest
    # Two-layer timeout: ZAP itself self-terminates at -T 150 (cmd_options below)
    # and produces a partial report cleanly. The job-level timeout-minutes is the
    # outer safety net set 30 min higher so the runner kills only if ZAP hangs
    # past its own deadline. Initial 60-min run (workflow run 25265466347) hit
    # the runner cutoff while ZAP was still actively scanning — bumped to give
    # the spider + AJAX spider + active probes room on a multi-route SPA.
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v6

      - name: Run ZAP full scan
        uses: zaproxy/action-full-scan@bee4e5be916301228d2b1b2dcad73aab6fa6a25b # v0.13.0
        with:
          target: ${{ github.event.inputs.target || 'https://seanbearden.com' }}
          docker_name: "ghcr.io/zaproxy/zaproxy:stable"
          rules_file_name: ".zap/rules.tsv"
          # -a: include alpha rules (broader coverage)
          # -T 150: cap ZAP's total run at 150 minutes; produces a partial report
          #         on timeout instead of getting killed mid-scan by the runner.
          cmd_options: "-a -T 150"
          fail_action: false
          allow_issue_writing: true
          artifact_name: "zap-full-scan-report"

      # Inline labeling: bot-created issues don't trigger `issues.opened`
      # listeners (GITHUB_TOKEN anti-recursion guard), so we label here using
      # the "RunnerID:<run_id>" anchor the action embeds in every issue body.
      # No-op when the scan is clean.
      #
      # Auth: uses JULES_LABEL_PAT (a user PAT with Issues: write) instead of
      # GITHUB_TOKEN — see zap-baseline.yml for full rationale.
      - name: Label auto-created ZAP issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.JULES_LABEL_PAT }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          set -euo pipefail
          NUM=$(gh search issues "RunnerID:${RUN_ID}" \
                  --repo "${REPO}" --state open --limit 1 \
                  --json number --jq '.[0].number // empty')
          if [[ -z "${NUM}" ]]; then
            echo "No ZAP issue created for run ${RUN_ID}; nothing to label."
            exit 0
          fi
          echo "Labeling issue #${NUM}"
          gh issue edit "${NUM}" --repo "${REPO}" \
            --add-label "jules" --add-label "security"
