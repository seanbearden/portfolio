codecov:
  require_ci_to_pass: true
  notify:
    wait_for_ci: true

coverage:
  precision: 2
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: auto
        threshold: 1%
        informational: true
    patch:
      default:
        target: 80%
        threshold: 1%
        informational: true

comment:
  layout: "newheader, diff, flags, components, files, condensed_footer"
  behavior: default
  require_changes: false
  hide_comment_details: true
  show_carryforward_flags: false

flags:
  frontend:
    paths:
      - frontend/src/
    carryforward: false

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 1%
        informational: true
  individual_components:
    - component_id: pages
      name: Pages
      paths:
        - frontend/src/pages/**
    - component_id: components
      name: Components
      paths:
        - frontend/src/components/**
    - component_id: utils
      name: Utils
      paths:
        - frontend/src/utils/**
    - component_id: lib
      name: Lib
      paths:
        - frontend/src/lib/**

ignore:
  - "infrastructure/**"
  - "scripts/**"
  - "content/**"
  - "**/*.config.{ts,js,mjs,cjs}"
  - "**/*.test.{ts,tsx}"
  - "**/*.spec.{ts,tsx}"
  - "**/__mocks__/**"
  - "frontend/dist/**"
  - "frontend/src/main.tsx"
  - "frontend/src/vite-env.d.ts"
